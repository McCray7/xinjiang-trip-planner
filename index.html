<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>新疆伊犁自驾行程规划</title>
    <meta
      name="description"
      content="面向手机浏览的新疆伊犁自驾行程规划，使用高德地图展示真实道路、里程和驾驶时长。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">移动行程规划</p>
        <h1>新疆伊犁自驾方案</h1>
        <p class="hero-copy">
          面向手机浏览的行程页，接入高德地图展示真实地图和真实驾车路线。
          点按每日行程卡片，即可查看当天实际道路、里程、驾驶时长和住宿点。
        </p>
      </header>

      <main class="layout">
        <section class="panel summary-panel">
          <div class="summary-top">
            <div>
              <p class="section-kicker">推荐结论</p>
              <h2 id="plan-title">8天7晚更优</h2>
            </div>
            <div class="toggle" role="tablist" aria-label="方案切换">
              <button class="toggle-btn is-active" data-plan="planA" role="tab" aria-selected="true">
                8D7N
              </button>
              <button class="toggle-btn" data-plan="planB" role="tab" aria-selected="false">
                6D5N
              </button>
            </div>
          </div>

          <div class="stats" id="plan-stats"></div>
          <p class="summary-text" id="plan-summary"></p>
          <div class="reason-list" id="plan-reasons"></div>
        </section>

        <section class="panel map-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">高德地图</p>
              <h2>真实驾车道路</h2>
            </div>
            <p class="map-hint" id="map-hint">点按下方某一天的卡片，可高亮显示当天的真实路线。</p>
          </div>

          <div class="map-stage">
            <div id="real-map" class="real-map" aria-label="高德真实路线地图"></div>
            <div class="map-legend">
              <span><i class="legend-dot plan-color"></i>方案涉及地点</span>
              <span><i class="legend-dot active-color"></i>当前选中路线</span>
            </div>
            <p class="map-mode-note">
              路线形状、里程和驾驶时长均来自高德驾车路线服务。
            </p>
          </div>
        </section>

        <section class="panel itinerary-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">每日安排</p>
              <h2>路上也能快速看懂</h2>
            </div>
            <button class="ghost-btn" id="jump-best-day" type="button">跳到重点日</button>
          </div>
          <div class="itinerary-list" id="itinerary-list"></div>
        </section>

        <section class="panel compare-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">方案对比</p>
              <h2>快速看清取舍</h2>
            </div>
          </div>
          <div class="compare-grid" id="compare-grid"></div>
        </section>

        <section class="panel checklist-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">出发前</p>
              <h2>准备清单</h2>
            </div>
          </div>
          <ol class="checklist" id="checklist"></ol>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
